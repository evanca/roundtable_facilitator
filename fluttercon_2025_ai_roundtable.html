    <style>
        :root{ --bg:#0b1220; --card:#121a2b; --ink:#e6edf6; --line:#7087b7; --node:#0f1a33; --border:#22304a; --yes:#3bc07b; --no:#ff8a8a; --accent:#a8c1ff; }
        body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 0; background: var(--bg); color: var(--ink); }
        .wrap { max-width: 1200px; margin: 24px auto; padding: 16px; }
        h1 { font-size: 20px; margin: 0 0 12px; font-weight: 700; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.25); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
        .nodeBox { cursor: pointer; border:1px solid #2a3a5f; border-radius: 12px; background: #0f1a33; padding: 10px 12px; position: relative; }
        .nodeBox:hover { outline: 2px solid #2a437a; }
        .nodeTitle { font-size: 13px; color: var(--accent); margin-bottom: 6px; font-weight: 700; }
        .chip { display:inline-block; padding:2px 8px; border-radius: 999px; font-size: 12px; border:1px solid var(--border); background:#0f1a33; color:#cfe1ff; margin-left: 6px; }
        .hint { font-size: 12.5px; color: #d7e3ff; opacity:.9 }
        .pill { padding: 2px 8px; border-radius: 999px; border:1px solid var(--border); font-size: 12px; }
        .pill.yes { color:#bdf6d2; border-color:#255b40; background:#0e2a1d; }
        .pill.no { color:#ffd6d6; border-color:#5b2525; background:#2a0e0e; }

        .details { display: none; background: #0f1a33; border: 1px solid #3a5599; border-radius: 10px; padding: 10px 12px; margin: 8px 0 4px; font-size: 13px; }
        .details.visible { display: block; }
        .details h3 { margin:0 0 4px; font-size:14px; color:#dbe7ff; }
        .details small { color:#9fb6d9; }
        .details ul { margin:6px 0 0 18px; }
        .details.hands-up { background: #0e2a1d; border-color: #255b40; }
        .details.no-hands { background: #2a0e0e; border-color: #5b2525; }
        .sectionTitle{ margin-top: 10px; font-size:14px; color:#bcd0ff; font-weight:700 }

        /* New prompt and response structure */
        .prompt-section { margin-bottom: 12px; }
        .prompt-text { 
            font-size: 16px; 
            color: var(--ink); 
            margin-bottom: 12px; 
            font-weight: 500;
            line-height: 1.4;
        }
        .response-options { 
            display: flex; 
            gap: 12px; 
            justify-content: center;
        }
        .response-btn { 
            background: var(--card); 
            border: 2px solid var(--border); 
            border-radius: 8px; 
            padding: 12px 20px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
        }
        .response-btn:hover { 
            border-color: var(--accent); 
            background: var(--node); 
            transform: translateY(-1px);
        }
        .response-btn:active { 
            transform: translateY(0);
        }
        .tab-bar { display: flex; margin-bottom: 20px; gap: 5px; }
        .tab-button { background: var(--card); color: var(--ink); border: 1px solid var(--border); padding: 10px 20px; cursor: pointer; border-radius: 5px 5px 0 0; }
        .tab-button.active { background: var(--node); border-bottom-color: var(--node); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Question Navigation Styles */
        .question-nav { margin-bottom: 20px; }
        .question-list { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .question-item { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 8px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px;
            transition: all 0.2s ease;
            color: var(--ink);
        }
        .question-item:hover { 
            border-color: var(--accent); 
            background: var(--node); 
        }
        .question-item.active { 
            background: var(--accent); 
            color: #0b1220; 
            border-color: var(--accent); 
            font-weight: 600; 
        }

        /* Topic Selection Styles */
        .topic-selection { text-align: center; padding: 40px 0; }
        .topic-buttons { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .topic-button { 
            background: var(--card); 
            border: 2px solid var(--border); 
            color: var(--ink); 
            padding: 20px 40px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: 600;
            transition: all 0.3s ease;
            min-width: 200px;
        }
        .topic-button:hover { 
            border-color: var(--accent); 
            background: var(--node); 
        }

        .hidden { display: none !important; }
        
        .loading { text-align: center; padding: 40px; color: var(--accent); }

        /* Roulette Modal */
        .roulette-modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(11, 18, 32, 0.95); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
        }
        .roulette-container { 
            background: var(--card); 
            border: 2px solid var(--border); 
            border-radius: 20px; 
            padding: 30px; 
            text-align: center; 
            max-width: 95vw; 
            max-height: 95vh; 
            width: 800px;
            position: relative;
            overflow-y: auto;
        }
        .roulette-close { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            background: none; 
            border: none; 
            color: var(--ink); 
            font-size: 24px; 
            cursor: pointer; 
            padding: 5px;
        }
        .roulette-close:hover { color: var(--accent); }

        /* Wheel Container */
        .wheel-container { 
            position: relative; 
            width: 400px; 
            height: 400px; 
            margin: 20px auto; 
        }
        @media (max-width: 480px) {
            .wheel-container { 
                width: 300px; 
                height: 300px; 
            }
        }

        /* The Wheel */
        .roulette-wheel { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            position: relative; 
            overflow: hidden; 
            border: 4px solid var(--accent); 
            box-shadow: 0 0 20px rgba(168, 193, 255, 0.3);
        }

        /* SVG-based wheel segments */
        .wheel-svg {
            width: 100%;
            height: 100%;
            transform-origin: center;
        }
        
        .segment-text {
            font-size: 10px;
            font-weight: 700;
            fill: #0b1220;
            text-anchor: middle;
            dominant-baseline: middle;
            paint-order: stroke fill;
            stroke: rgba(255,255,255,0.8);
            stroke-width: 0.5px;
        }

        /* Roulette Result Grid */
        .roulette-questions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        @media (max-width: 600px) {
            .roulette-questions-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Wheel Pointer */
        .wheel-pointer { 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent; 
            border-right: 15px solid transparent; 
            border-top: 30px solid var(--accent); 
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        /* Spinning Animation */
        .wheel-spinning { 
            animation: roulette-spin 4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; 
        }
        @keyframes roulette-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(var(--spin-rotation)); }
        }

        /* Roulette Controls */
        .roulette-controls { 
            margin-top: 20px; 
        }
        .roulette-btn { 
            background: var(--accent); 
            border: 2px solid var(--accent); 
            color: #0b1220; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 16px; 
            margin: 0 10px;
            transition: all 0.2s ease;
        }
        .roulette-btn:hover { 
            background: var(--ink); 
            border-color: var(--ink); 
        }
        .roulette-btn:disabled { 
            background: var(--border); 
            border-color: var(--border); 
            color: #7087b7; 
            cursor: not-allowed; 
        }

        /* Result Display */
        .roulette-result { 
            margin-top: 20px; 
            padding: 15px; 
            background: var(--node); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: 600; 
            color: var(--accent); 
        }

        /* Section Highlighting */
        .roulette-selected { 
            background: linear-gradient(135deg, rgba(168, 193, 255, 0.2), rgba(168, 193, 255, 0.1)) !important; 
            border: 2px solid var(--accent) !important; 
            box-shadow: 0 0 15px rgba(168, 193, 255, 0.4) !important;
            position: relative;
        }
        .roulette-selected::before { 
            content: "🎰 Roulette Selected"; 
            position: absolute; 
            top: -10px; 
            right: 10px; 
            background: var(--accent); 
            color: #0b1220; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: 600; 
        }
    </style>

        function toggle(id){
          const el = document.getElementById(id);
          if(!el) return;
          el.classList.toggle('visible');
        }

        function showTab(tabId) {
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(button => button.classList.remove('active'));
            const questionItems = document.querySelectorAll('.question-item');
            questionItems.forEach(item => item.classList.remove('active'));
            
            document.getElementById(tabId + '-content').classList.add('active');
            
            // Find and activate the corresponding question item
            const questionNum = tabId.replace('q', '');
            const questionItemsArray = document.querySelectorAll('.question-item');
            if (questionItemsArray[questionNum - 1]) {
                questionItemsArray[questionNum - 1].classList.add('active');
            }
        }

        function loadTopic(topic) {
            currentTopic = topic;
            document.getElementById('topic-selection').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                // Use embedded data instead of fetching JSON files
                questionsData = embeddedData[topic];

                generateContent();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').innerHTML = `<h2>Error loading ${topic} data</h2><p>Please check that the embedded data is available.</p>`;
            }
        }

        function goBackToSelection() {
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('topic-selection').classList.remove('hidden');
        }

        // Roulette System
        let rouletteSegments = [];
        let isSpinning = false;

        function openRoulette() {
            if (!currentTopic) {
                alert('Please select a topic first!');
                return;
            }
            
            generateRouletteSegments();
            renderRouletteWheel();
            updateRouletteStats();
            document.getElementById('roulette-modal').classList.remove('hidden');
        }

        function closeRoulette() {
            document.getElementById('roulette-modal').classList.add('hidden');
            clearRouletteSelection();
            
            // Reset to initial state
            showWheelForNext();
        }

        function generateRouletteSegments() {
            rouletteSegments = [];
            const usedSegments = getUsedSegments();
            
            if (!questionsData) return;
            
            // Generate segments for each question and section
            for (let qNum = 1; qNum <= 6; qNum++) {
                const questionKey = `q${qNum}`;
                const questionData = questionsData[questionKey];
                
                if (!questionData || !questionData.sections) continue;
                
                questionData.sections.forEach((section, sectionIndex) => {
                    const segmentId = `Q${qNum}S${sectionIndex + 1}`;
                    
                    // Only include if not already used
                    if (!usedSegments.includes(segmentId)) {
                        rouletteSegments.push({
                            id: segmentId,
                            questionNum: qNum,
                            sectionIndex: sectionIndex,
                            title: section.title,
                            prompt: section.prompt
                        });
                    }
                });
            }
        }

        function renderRouletteWheel() {
            const wheel = document.getElementById('roulette-wheel');
            wheel.innerHTML = '';
            
            if (rouletteSegments.length === 0) {
                wheel.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--ink); font-size: 18px; font-weight: 600; text-align: center;">All segments used!<br>Reset to continue.</div>';
                document.getElementById('spin-btn').disabled = true;
                return;
            }
            
            document.getElementById('spin-btn').disabled = false;
            
            // Fixed number of visual segments for consistent spinning
            const visualSegments = 12;
            const segmentAngle = 360 / visualSegments;
            const colors = [
                '#a8c1ff', '#3bc07b', '#ff8a8a', '#ffd93d', 
                '#ff9f43', '#a55eea', '#26de81', '#fd79a8',
                '#74b9ff', '#e17055', '#00b894', '#fdcb6e'
            ];
            
            // Create SVG element
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('class', 'wheel-svg');
            svg.setAttribute('viewBox', '0 0 200 200');
            
            const centerX = 100;
            const centerY = 100;
            const radius = 95;
            
            // Create visual segments (just colors, no labels)
            for (let i = 0; i < visualSegments; i++) {
                const startAngle = (i * segmentAngle - 90) * Math.PI / 180;
                const endAngle = ((i + 1) * segmentAngle - 90) * Math.PI / 180;
                
                const x1 = centerX + radius * Math.cos(startAngle);
                const y1 = centerY + radius * Math.sin(startAngle);
                const x2 = centerX + radius * Math.cos(endAngle);
                const y2 = centerY + radius * Math.sin(endAngle);
                
                const largeArcFlag = segmentAngle > 180 ? 1 : 0;
                
                // Create path for segment
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const pathData = `M ${centerX} ${centerY} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;
                path.setAttribute('d', pathData);
                path.setAttribute('fill', colors[i % colors.length]);
                path.setAttribute('stroke', '#ffffff');
                path.setAttribute('stroke-width', '1');
                
                svg.appendChild(path);
            }
            
            wheel.appendChild(svg);
        }

        function spinWheel() {
            if (isSpinning || rouletteSegments.length === 0) return;
            
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('roulette-result').classList.add('hidden');
            
            // Clear any previous selection highlighting
            clearRouletteSelection();
            
            // Randomly select from unused segments (independent of visual wheel)
            const selectedIndex = Math.floor(Math.random() * rouletteSegments.length);
            const selectedSegment = rouletteSegments[selectedIndex];
            
            // Create a fun spinning animation with random final position
            const baseSpins = 5; // Number of full rotations
            const randomFinalAngle = Math.random() * 360; // Random final position
            const totalRotation = baseSpins * 360 + randomFinalAngle;
            
            // Apply spinning animation
            const wheel = document.getElementById('roulette-wheel');
            const svg = wheel.querySelector('.wheel-svg');
            if (svg) {
                svg.style.setProperty('--spin-rotation', `${totalRotation}deg`);
                svg.classList.add('wheel-spinning');
            }
            
            // Handle result after animation (independent of where wheel stops)
            setTimeout(() => {
                handleSpinResult(selectedSegment);
                if (svg) {
                    svg.classList.remove('wheel-spinning');
                }
                isSpinning = false;
                document.getElementById('spin-btn').disabled = false;
            }, 4000);
        }

        function handleSpinResult(selectedSegment) {
            // Mark segment as used
            markSegmentAsUsed(selectedSegment.id);
            
            // Get the full section data
            const questionData = questionsData[`q${selectedSegment.questionNum}`];
            const section = questionData.sections[selectedSegment.sectionIndex];
            
            // Show full section content
            const resultDiv = document.getElementById('roulette-result');
            resultDiv.innerHTML = `
                <div style="font-size: 24px; margin-bottom: 15px;">🎯 ${selectedSegment.id}</div>
                <div style="background: var(--node); border: 1px solid var(--border); border-radius: 8px; padding: 15px; text-align: left;">
                    <div style="font-size: 16px; color: var(--accent); margin-bottom: 10px; font-weight: 600;">${section.title}</div>
                    <div style="font-size: 15px; color: var(--ink); margin-bottom: 12px; font-weight: 500;">${section.prompt}</div>
                    <div style="font-size: 13px; color: var(--line); margin-bottom: 15px; font-style: italic;">${section.hints}</div>
                    
                    <div style="margin-top: 15px;">
                        <div style="display: flex; gap: 12px; justify-content: center;">
                            <button onclick="toggleRouletteDetails('${selectedSegment.id}No')" 
                                    style="background: var(--card); border: 2px solid var(--border); color: var(--ink); padding: 12px 20px; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; min-width: 120px;">
                                <span style="padding: 2px 8px; border-radius: 999px; border:1px solid var(--border); font-size: 12px; color:#ffd6d6; border-color:#5b2525; background:#2a0e0e;">No Hands</span>
                            </button>
                            <button onclick="toggleRouletteDetails('${selectedSegment.id}Yes')" 
                                    style="background: var(--card); border: 2px solid var(--border); color: var(--ink); padding: 12px 20px; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; min-width: 120px;">
                                <span style="padding: 2px 8px; border-radius: 999px; border:1px solid var(--border); font-size: 12px; color:#bdf6d2; border-color:#255b40; background:#0e2a1d;">Hands Up</span>
                            </button>
                        </div>
                        
                        <div id="${selectedSegment.id}No" class="roulette-details no-hands" style="display: none; background: #2a0e0e; border: 1px solid #5b2525; border-radius: 10px; padding: 10px 12px; margin: 8px 0 4px; font-size: 13px;">
                            <h3 style="margin:0 0 4px; font-size:14px; color:#dbe7ff;">🙅 No Hands Questions</h3>
                            <ul style="margin:6px 0 0 18px;">
                                ${section.no_hands.map(q => `<li style="margin-bottom: 4px;">${q}</li>`).join('')}
                            </ul>
                        </div>
                        
                        <div id="${selectedSegment.id}Yes" class="roulette-details hands-up" style="display: none; background: #0e2a1d; border: 1px solid #255b40; border-radius: 10px; padding: 10px 12px; margin: 8px 0 4px; font-size: 13px;">
                            <h3 style="margin:0 0 4px; font-size:14px; color:#dbe7ff;">🙋 Hands Up Questions</h3>
                            <ul style="margin:6px 0 0 18px;">
                                ${section.hands_up.map(q => `<li style="margin-bottom: 4px;">${q}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <button onclick="navigateToSelectedSection('${selectedSegment.questionNum}', '${selectedSegment.sectionIndex}')" 
                            style="background: var(--card); border: 1px solid var(--border); color: var(--ink); padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: 600;">
                        📍 Go to Full Page
                    </button>
                </div>
            `;
            resultDiv.classList.remove('hidden');
            
            // Update segments and stats
            generateRouletteSegments();
            renderRouletteWheel();
            updateRouletteStats();
            
            // Automatically hide wheel after showing result
            hideWheelShowNext();
        }

        function hideWheelShowNext() {
            // Hide wheel and wheel controls
            document.querySelector('.wheel-container').classList.add('hidden');
            document.getElementById('wheel-controls').classList.add('hidden');
            
            // Show next controls
            document.getElementById('next-controls').classList.remove('hidden');
            
            // Update title
            document.querySelector('#roulette-modal h2').textContent = '📋 Discussion Time';
            document.querySelector('#roulette-modal p').textContent = 'Discuss the topic above, then spin again for the next one!';
        }

        function showWheelForNext() {
            // Show wheel and wheel controls
            document.querySelector('.wheel-container').classList.remove('hidden');
            document.getElementById('wheel-controls').classList.remove('hidden');
            
            // Hide next controls and result
            document.getElementById('next-controls').classList.add('hidden');
            document.getElementById('roulette-result').classList.add('hidden');
            
            // Update title back
            document.querySelector('#roulette-modal h2').textContent = '🎰 Question Roulette';
            document.querySelector('#roulette-modal p').textContent = 'Spin to randomly select a discussion topic!';
        }

        function navigateToSelectedSection(questionNum, sectionIndex) {
            closeRoulette();
            
            // Switch to the correct question tab
            showTab(`q${questionNum}`);
            
            // Highlight the selected section
            setTimeout(() => {
                highlightSelectedSection(questionNum, sectionIndex);
            }, 100);
        }

        function highlightSelectedSection(questionNum, sectionIndex) {
            // Clear previous selections
            clearRouletteSelection();
            
            // Find and highlight the section
            const questionData = questionsData[`q${questionNum}`];
            if (!questionData || !questionData.sections[sectionIndex]) return;
            
            const section = questionData.sections[sectionIndex];
            
            // Find the section card by looking for the section title within the current question
            setTimeout(() => {
                const activeQuestionContent = document.querySelector('.tab-content.active');
                if (!activeQuestionContent) return;
                
                const cards = activeQuestionContent.querySelectorAll('.card');
                // Skip the wrap-up card (last one), only highlight section cards
                const sectionCards = Array.from(cards).slice(0, -1);
                
                if (sectionCards[sectionIndex]) {
                    sectionCards[sectionIndex].classList.add('roulette-selected');
                    sectionCards[sectionIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 200);
        }

        function clearRouletteSelection() {
            document.querySelectorAll('.roulette-selected').forEach(el => {
                el.classList.remove('roulette-selected');
            });
        }

        function toggleRouletteDetails(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        // LocalStorage Management
        function getStorageKey() {
            return `roulette_used_${currentTopic}`;
        }

        function getUsedSegments() {
            const stored = localStorage.getItem(getStorageKey());
            return stored ? JSON.parse(stored) : [];
        }

        function markSegmentAsUsed(segmentId) {
            const used = getUsedSegments();
            if (!used.includes(segmentId)) {
                used.push(segmentId);
                localStorage.setItem(getStorageKey(), JSON.stringify(used));
            }
        }

        function resetRoulette() {
            if (confirm('Reset all used segments? This will make all topics available again.')) {
                localStorage.removeItem(getStorageKey());
                generateRouletteSegments();
                renderRouletteWheel();
                updateRouletteStats();
                
                // Reset to wheel view
                showWheelForNext();
            }
        }

        function updateRouletteStats() {
            const usedSegments = getUsedSegments();
            const totalSegments = getTotalSegments();
            const availableSegments = rouletteSegments.length;
            
            document.getElementById('roulette-stats').innerHTML = `
                Available: ${availableSegments} | Used: ${usedSegments.length} | Total: ${totalSegments}
            `;
            
            // Update used questions list
            const usedQuestionsDiv = document.getElementById('used-questions-list');
            if (usedSegments.length === 0) {
                usedQuestionsDiv.innerHTML = '<em>None yet - spin to get started!</em>';
            } else {
                // Group by question for better display
                const groupedUsed = {};
                usedSegments.forEach(segmentId => {
                    const qMatch = segmentId.match(/Q(\d+)S(\d+)/);
                    if (qMatch) {
                        const qNum = qMatch[1];
                        const sNum = qMatch[2];
                        if (!groupedUsed[qNum]) {
                            groupedUsed[qNum] = [];
                        }
                        groupedUsed[qNum].push(sNum);
                    }
                });
                
                let html = '';
                Object.keys(groupedUsed).sort().forEach(qNum => {
                    const sections = groupedUsed[qNum].sort();
                    html += `<span style="display: inline-block; margin: 2px 6px 2px 0; padding: 2px 6px; background: var(--node); border-radius: 4px; border: 1px solid var(--border);">Q${qNum}: ${sections.map(s => `S${s}`).join(', ')}</span>`;
                });
                usedQuestionsDiv.innerHTML = html;
            }
        }

        function getTotalSegments() {
            if (!questionsData) return 0;
            
            let total = 0;
            for (let qNum = 1; qNum <= 6; qNum++) {
                const questionData = questionsData[`q${qNum}`];
                if (questionData && questionData.sections) {
                    total += questionData.sections.length;
                }
            }
            return total;
        }

        function generateContent() {
            const contentArea = document.getElementById('content-area');
            const mainTitle = document.getElementById('main-title');
            const questionList = document.getElementById('question-list');
            
            // Update title
            const topicDisplayName = currentTopic === 'ai' ? 'AI in Flutter Development' : 'App Monetization';
            mainTitle.innerHTML = `FlutterCon 2025 ${topicDisplayName} Roundtable Facilitator <span class="chip">Click any box to expand</span>`;
            
            // Generate question navigation
            questionList.innerHTML = '';
            for (let qNum = 1; qNum <= 6; qNum++) {
                const questionTitle = getQuestionTitle(currentTopic, qNum);
                const questionItem = document.createElement('div');
                questionItem.className = qNum === 1 ? 'question-item active' : 'question-item';
                questionItem.textContent = questionTitle;
                questionItem.onclick = () => showTab(`q${qNum}`);
                questionList.appendChild(questionItem);
            }
            
            // Clear previous content
            contentArea.innerHTML = '';
            
            // Generate content for each question
            for (let qNum = 1; qNum <= 6; qNum++) {
                const questionKey = `q${qNum}`;
                const questionData = questionsData[questionKey];
                
                if (!questionData) continue;
                
                const questionDiv = document.createElement('div');
                questionDiv.id = `${questionKey}-content`;
                questionDiv.className = qNum === 1 ? 'tab-content active' : 'tab-content';
                
                // Question title
                const questionTitle = getQuestionTitle(currentTopic, qNum);
                questionDiv.innerHTML = `<h1>${questionTitle}</h1>`;
                
                // Generate sections
                questionData.sections.forEach((section, sectionIndex) => {
                    const sectionId = getSectionId(section.title);
                    
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'card';
                    
                    cardDiv.innerHTML = `
                        <div class="sectionTitle">${section.title}</div>
                        <div class="prompt-section">
                            <div class="prompt-text">${section.prompt}</div>
                            <div class="response-options">
                                <button class="response-btn no-btn" onclick="toggle('${sectionId}No')">
                                    <span class="pill no">No Hands</span>
                                </button>
                                <button class="response-btn yes-btn" onclick="toggle('${sectionId}Yes')">
                                    <span class="pill yes">Hands Up</span>
                                </button>
                            </div>
                        </div>
                        <div id="${sectionId}No" class="details no-hands">
                            <h3>${section.title.replace(/^[A-Z]\)\s*/, '')} – No Hands</h3>
                            <small>${section.hints}</small>
                            <ul>
                                ${section.no_hands.map(q => `<li>${q}</li>`).join('')}
                            </ul>
                        </div>
                        <div id="${sectionId}Yes" class="details hands-up">
                            <h3>${section.title.replace(/^[A-Z]\)\s*/, '')} – Hands Up</h3>
                            <small>${section.hints}</small>
                            <ul>
                                ${section.hands_up.map(q => `<li>${q}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                    
                    questionDiv.appendChild(cardDiv);
                });
                
                // Add wrap-up section
                if (questionData.wrap_up && questionData.wrap_up.length > 0) {
                    const wrapUpDiv = document.createElement('div');
                    wrapUpDiv.className = 'card';
                    wrapUpDiv.innerHTML = `
                        <div class="sectionTitle">Wrap-up Question</div>
                        <div class="prompt-section">
                            <div class="prompt-text">Final thoughts on ${questionTitle.toLowerCase()}</div>
                            <div class="response-options">
                                <button class="response-btn wrap-btn" onclick="toggle('${questionKey}Wrap')" style="width: 100%;">
                                    <span class="pill" style="background: var(--accent); color: #0b1220;">Discuss Wrap-up</span>
                                </button>
                            </div>
                        </div>
                        <div id="${questionKey}Wrap" class="details">
                            <h3>${questionTitle} Wrap-up</h3>
                            <ul>
                                ${questionData.wrap_up.map(q => `<li>${q}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                    questionDiv.appendChild(wrapUpDiv);
                }
                
                contentArea.appendChild(questionDiv);
            }
        }

        function getQuestionTitle(topic, qNum) {
            const titles = {
                ai: [
                    'Q1: AI Tools in Use',
                    'Q2: Integrating AI Without Losing Quality',
                    'Q3: AI Beyond Coding',
                    'Q4: Boundaries for AI in Production',
                    'Q5: Staying Current Without Tool Fatigue',
                    'Q6: Bonus Topics (If Time Allows)'
                ],
                monetization: [
                    'Q1: Monetization Models',
                    'Q2: Referrals & Viral Loops',
                    'Q3: Pricing Strategy',
                    'Q4: Tools & Packages',
                    'Q5: User Experience vs Monetization',
                    'Q6: Bonus Questions'
                ]
            };
            return titles[topic][qNum - 1] || `Q${qNum}`;
        }

        function getSectionId(title) {
            return title.replace(/[^a-zA-Z]/g, '').toLowerCase();
        }
    </script>
</head>
<body>
    <!-- Topic Selection Screen -->
    <div id="topic-selection" class="topic-selection">
        <div class="wrap">
            <h1>FlutterCon 2025 Roundtable Facilitator</h1>
            <p>Select your roundtable topic:</p>
            <div class="topic-buttons">
                <button class="topic-button" onclick="loadTopic('ai')">
                    🤖 AI in Flutter Development
                </button>
                <button class="topic-button" onclick="loadTopic('monetization')">
                    💰 App Monetization
                </button>
            </div>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading" class="loading hidden">
        <h2>Loading content...</h2>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <div class="wrap">
            <h1 id="main-title">FlutterCon 2025 Roundtable Facilitator <span class="chip">Click any box to expand</span></h1>
            
            <div style="margin-bottom: 20px; display: flex; gap: 12px; align-items: center;">
                <button onclick="goBackToSelection()" style="background: var(--card); border: 1px solid var(--border); color: var(--ink); padding: 8px 16px; border-radius: 5px; cursor: pointer;">
                    ← Back to Topic Selection
                </button>
                <button onclick="openRoulette()" style="background: var(--accent); border: 1px solid var(--accent); color: #0b1220; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: 600;">
                    🎰 Open Roulette
                </button>
            </div>

            <div class="question-nav">
                <div id="question-list" class="question-list">
                    <!-- Questions will be populated by JavaScript -->
                </div>
            </div>

            <div id="content-area"></div>
        </div>
    </div>

    <!-- Roulette Modal -->
    <div id="roulette-modal" class="roulette-modal hidden">
        <div class="roulette-container">
            <button class="roulette-close" onclick="closeRoulette()">×</button>
            <h2 style="margin-top: 0; color: var(--accent);">🎰 Question Roulette</h2>
            <p style="color: var(--ink); margin-bottom: 20px;">Spin to randomly select a discussion topic!</p>
            
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <div id="roulette-wheel" class="roulette-wheel">
                    <!-- Wheel segments will be generated by JavaScript -->
                </div>
            </div>
            
            <div id="wheel-controls" class="roulette-controls">
                <button id="spin-btn" class="roulette-btn" onclick="spinWheel()">
                    🎲 Spin the Wheel!
                </button>
                <button class="roulette-btn" onclick="resetRoulette()" style="background: var(--card); border-color: var(--border); color: var(--ink);">
                    🔄 Reset Used
                </button>
            </div>
            
            <div id="next-controls" class="roulette-controls hidden">
                <button class="roulette-btn" onclick="showWheelForNext()" style="font-size: 18px;">
                    🎰 Next Spin
                </button>
                <button class="roulette-btn" onclick="resetRoulette()" style="background: var(--card); border-color: var(--border); color: var(--ink);">
                    🔄 Reset Used
                </button>
            </div>
            
            <div id="roulette-result" class="roulette-result hidden">
                <!-- Result will be shown here -->
            </div>
            
            <div id="roulette-stats" style="margin-top: 15px; color: var(--line); font-size: 14px;">
                <!-- Stats will be shown here -->
            </div>
            
            <div id="used-questions" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border);">
                <h4 style="margin: 0 0 10px 0; color: var(--accent); font-size: 14px;">Already Used:</h4>
                <div id="used-questions-list" style="color: var(--line); font-size: 12px; line-height: 1.4;">
                    <!-- Used questions will be shown here -->
                </div>
            </div>
        </div>
    </div>
</body>
</html>
